name: CI

on:
  push:
    branches: master

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - shell: bash
        run: |
          set -euo pipefail
          set -x
          python3 main.py 1
          python3 main.py 1 2
          python3 main.py 1 2 3
